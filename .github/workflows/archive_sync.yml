      #     else
      #       git commit -m "Move current archive folders into CNEMC"
      #       git pull --rebase
      #       git push
      #     fi

      # 第二步：只同步外部 CNEMC 仓库中 2022 年全年数据
      - name: Sync external CNEMC archive for 2022
        run: |
          set -e

          rm -rf /tmp/cnemc_repo
          git clone --depth=1 https://github.com/HeQinWill/CNEMC.git /tmp/cnemc_repo

          mkdir -p Archive/CNEMC

          start_date="2022-01-01"
          end_date="2023-01-01"

          shopt -s nullglob

          for d in /tmp/cnemc_repo/Archive/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]; do
            if [ -d "$d" ]; then
              base=$(basename "$d")

              if [[ "$base" >= "$start_date" && "$base" < "$end_date" ]]; then
                echo "Syncing $base"
                mkdir -p "Archive/CNEMC/$base"
                rsync -a --ignore-existing "$d/" "Archive/CNEMC/$base/"
              else
                echo "Skipping $base"
              fi
            fi
          done

      # 再提交第二步
      - name: Commit external archive for 2022
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Archive/CNEMC

          if git diff --cached --quiet; then
            echo "No external archive changes for 2022."
          else
            git commit -m "Sync CNEMC archive for 2022"
            git pull --rebase
            git push
          fi
