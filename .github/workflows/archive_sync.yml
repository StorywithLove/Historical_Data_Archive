name: Sync Historical Archive By Month

on:
  workflow_dispatch:
    inputs:
      sync_month:
        description: "Month to sync, format: YYYY-MM, default is last month"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  sync-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare month parameters
        id: params
        run: |
          set -e

          # 默认上个月
          if [ -z "${{ github.event.inputs.sync_month }}" ]; then
            sync_month=$(date -d "$(date +%Y-%m-01) -1 month" +%Y-%m)
          else
            sync_month="${{ github.event.inputs.sync_month }}"
          fi

          if [[ ! "$sync_month" =~ ^[0-9]{4}-[0-9]{2}$ ]]; then
            echo "Invalid sync_month format: $sync_month"
            exit 1
          fi

          start_date="${sync_month}-01"
          end_date=$(date -d "$start_date +1 month" +%Y-%m-%d)

          echo "sync_month=$sync_month" >> "$GITHUB_OUTPUT"
          echo "start_date=$start_date" >> "$GITHUB_OUTPUT"
          echo "end_date=$end_date" >> "$GITHUB_OUTPUT"

      - name: Sync CNEMC archive
        run: |
          set -e
          sync_month="${{ steps.params.outputs.sync_month }}"
          mkdir -p Archive/CNEMC

          start_ts=$(date +%s)
          for d in $(seq -w 01 31); do
            folder="${sync_month}-${d}"
            mkdir -p "Archive/CNEMC/$folder"
            downloaded=0

            for h in $(seq -w 0 23); do
              file_name="${folder}T${h}.csv"
              url="https://raw.githubusercontent.com/StorywithLove/workflow/main/Archive/CNEMC/${file_name}"

              if curl --head --silent --fail "$url" >/dev/null; then
                curl -sS "$url" -o "Archive/CNEMC/$folder/$file_name"
                downloaded=$((downloaded + 1))
              else
                echo "Warning: missing CNEMC file $file_name"
              fi
            done
            echo "Finished $folder, downloaded $downloaded/24 files"
          done
          end_ts=$(date +%s)
          echo "CNEMC sync finished, cost $((end_ts - start_ts)) seconds."

      - name: Sync ZJEMC archive
        run: |
          set -e
          sync_month="${{ steps.params.outputs.sync_month }}"
          mkdir -p Archive/ZJEMC

          start_ts=$(date +%s)
          for d in $(seq -w 01 31); do
            folder="${sync_month}-${d}"
            mkdir -p "Archive/ZJEMC/$folder"
            downloaded=0

            for h in $(seq -w 0 23); do
              file_name="${folder}T${h}.csv"
              url="https://raw.githubusercontent.com/StorywithLove/workflow/main/Archive/ZJEMC/${file_name}"

              if curl --head --silent --fail "$url" >/dev/null; then
                curl -sS "$url" -o "Archive/ZJEMC/$folder/$file_name"
                downloaded=$((downloaded + 1))
              else
                echo "Warning: missing ZJEMC file $file_name"
              fi
            done
            echo "Finished $folder, downloaded $downloaded/24 files"
          done
          end_ts=$(date +%s)
          echo "ZJEMC sync finished, cost $((end_ts - start_ts)) seconds."

      - name: Commit external archive
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Archive/CNEMC Archive/ZJEMC

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync CNEMC & ZJEMC archives for ${{ steps.params.outputs.sync_month }}"
            git pull --rebase
            git push --progress
          fi
