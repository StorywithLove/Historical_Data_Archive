name: Sync Historical Archive Small Batch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 第一步：当前仓库已有 Archive 日期文件夹移动到 Archive/CNEMC
      - name: Move current Archive date folders into Archive/CNEMC
        run: |
          set -e

          mkdir -p Archive/CNEMC
          shopt -s nullglob

          for d in Archive/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]; do
            if [ -d "$d" ]; then
              base=$(basename "$d")
              mkdir -p "Archive/CNEMC/$base"

              echo "Moving $d -> Archive/CNEMC/$base"

              rsync -a "$d/" "Archive/CNEMC/$base/"
              rm -rf "$d"
            fi
          done

      # 先提交第一步，避免所有变更堆到最后
      - name: Commit moved current archive
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Archive

          if git diff --cached --quiet; then
            echo "No current archive move changes."
          else
            git commit -m "Move current archive folders into CNEMC"
            git pull --rebase
            git push
          fi

      # 第二步：只同步外部 CNEMC 仓库中 2022 年之前的数据
      - name: Sync external CNEMC archive before 2022
        run: |
          set -e

          rm -rf /tmp/cnemc_repo
          git clone --depth=1 https://github.com/HeQinWill/CNEMC.git /tmp/cnemc_repo

          mkdir -p Archive/CNEMC

          cutoff="2022-01-01"

          shopt -s nullglob

          for d in /tmp/cnemc_repo/Archive/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]; do
            if [ -d "$d" ]; then
              base=$(basename "$d")

              if [[ "$base" < "$cutoff" ]]; then
                echo "Syncing $base"
                mkdir -p "Archive/CNEMC/$base"
                rsync -a --ignore-existing "$d/" "Archive/CNEMC/$base/"
              else
                echo "Skipping $base"
              fi
            fi
          done

      # 再提交第二步
      - name: Commit external archive before 2022
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Archive/CNEMC

          if git diff --cached --quiet; then
            echo "No external archive changes before 2022."
          else
            git commit -m "Sync CNEMC archive before 2022"
            git pull --rebase
            git push
          fi
