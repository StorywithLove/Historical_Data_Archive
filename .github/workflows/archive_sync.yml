name: Sync Historical Archive By Month

on:
  workflow_dispatch:
    inputs:
      sync_month:
        description: "Month to sync, format: YYYY-MM, default is last month"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  sync-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 第一步：准备月份参数（默认上个月）
      - name: Prepare month parameters
        id: params
        run: |
          set -e

          if [ -z "${{ github.event.inputs.sync_month }}" ]; then
            sync_month=$(date -d "$(date +%Y-%m-01) -1 month" +%Y-%m)
            echo "No sync_month input, defaulting to last month: $sync_month"
          else
            sync_month="${{ github.event.inputs.sync_month }}"
          fi

          if [[ ! "$sync_month" =~ ^[0-9]{4}-[0-9]{2}$ ]]; then
            echo "Invalid sync_month format: $sync_month"
            exit 1
          fi

          start_date="${sync_month}-01"
          end_date=$(date -u -d "$start_date +1 month" +%Y-%m-%d)

          echo "sync_month=$sync_month" >> "$GITHUB_OUTPUT"
          echo "start_date=$start_date" >> "$GITHUB_OUTPUT"
          echo "end_date=$end_date" >> "$GITHUB_OUTPUT"

      # 第二步：（1）同步 CNEMC 指定月份的日期文件夹
      - name: Sync CNEMC archive
        run: |
          set -e

          sync_month="${{ steps.params.outputs.sync_month }}"
          mkdir -p Archive/CNEMC

          tmp_dir="/tmp/cnemc_repo"
          rm -rf "$tmp_dir"
          git clone --depth=1 --filter=blob:none --no-checkout https://github.com/StorywithLove/workflow.git "$tmp_dir"
          cd "$tmp_dir"
          git sparse-checkout init --no-cone
          git sparse-checkout set "Archive/CNEMC/${sync_month}-*"
          git checkout --progress
          cd -

          mapfile -t dirs < <(find "$tmp_dir/Archive/CNEMC" -maxdepth 1 -mindepth 1 -type d -printf "%f\n" | sort)
          total=${#dirs[@]}
          echo "Found $total CNEMC folders for $sync_month."

          i=0
          for base in "${dirs[@]}"; do
            i=$((i+1))
            echo "[$i/$total] Syncing CNEMC/$base"
            mkdir -p "Archive/CNEMC/$base"
            rsync -a --ignore-existing "$tmp_dir/Archive/CNEMC/$base/" "Archive/CNEMC/$base/"
            file_count=$(find "Archive/CNEMC/$base" -type f | wc -l)
            echo "[$i/$total] Finished $base, local file count: $file_count"
          done

      # 第二步：（2）同步 ZJEMC 指定月份的日期文件夹
      - name: Sync ZJEMC archive
        run: |
          set -e

          sync_month="${{ steps.params.outputs.sync_month }}"
          mkdir -p Archive/ZJEMC

          tmp_dir="/tmp/zjemc_repo"
          rm -rf "$tmp_dir"
          git clone --depth=1 --filter=blob:none --no-checkout https://github.com/StorywithLove/workflow.git "$tmp_dir"
          cd "$tmp_dir"
          git sparse-checkout init --no-cone
          git sparse-checkout set "Archive/ZJEMC/${sync_month}-*"
          git checkout --progress
          cd -

          mapfile -t dirs < <(find "$tmp_dir/Archive/ZJEMC" -maxdepth 1 -mindepth 1 -type d -printf "%f\n" | sort)
          total=${#dirs[@]}
          echo "Found $total ZJEMC folders for $sync_month."

          i=0
          for base in "${dirs[@]}"; do
            i=$((i+1))
            echo "[$i/$total] Syncing ZJEMC/$base"
            mkdir -p "Archive/ZJEMC/$base"
            rsync -a --ignore-existing "$tmp_dir/Archive/ZJEMC/$base/" "Archive/ZJEMC/$base/"
            file_count=$(find "Archive/ZJEMC/$base" -type f | wc -l)
            echo "[$i/$total] Finished $base, local file count: $file_count"
          done
          
      # 第二步：（3）同步 PVPower 指定月份的每日文件
      - name: Sync PVPower archive
        run: |
          set -e

          sync_month="${{ steps.params.outputs.sync_month }}"
          mkdir -p "Archive/PVPower/${sync_month}"

          tmp_dir="/tmp/pvpower_repo"
          rm -rf "$tmp_dir"

          git clone --depth=1 --filter=blob:none --no-checkout https://github.com/StorywithLove/workflow.git "$tmp_dir"
          cd "$tmp_dir"
          git sparse-checkout init --no-cone
          git sparse-checkout set "Archive/PVPower/${sync_month}/HZ_${sync_month}-*.csv"
          git checkout --progress
          cd -

          if [ ! -d "$tmp_dir/Archive/PVPower/${sync_month}" ]; then
            echo "No PVPower month directory found for $sync_month."
            exit 0
          fi

          file_count=$(find "$tmp_dir/Archive/PVPower/${sync_month}" -maxdepth 1 -type f -name "HZ_${sync_month}-*.csv" | wc -l)
          echo "Found $file_count PVPower files for $sync_month."

          if [ "$file_count" -eq 0 ]; then
            echo "No PVPower files to sync for $sync_month."
            exit 0
          fi

          rsync -a --ignore-existing \
            "$tmp_dir/Archive/PVPower/${sync_month}/" \
            "Archive/PVPower/${sync_month}/"

          local_count=$(find "Archive/PVPower/${sync_month}" -maxdepth 1 -type f -name "HZ_${sync_month}-*.csv" | wc -l)
          echo "Finished PVPower sync for $sync_month, local file count: $local_count"
          
      # 第三步：提交并推送
      - name: Commit external archive
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Archive/CNEMC Archive/ZJEMC Archive/PVPower

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync CNEMC & ZJEMC & PVPower archives for ${{ steps.params.outputs.sync_month }}"
            git pull --rebase
            git push --progress
          fi
