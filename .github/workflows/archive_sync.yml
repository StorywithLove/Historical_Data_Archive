name: Sync Historical Archive By Month

on:
  workflow_dispatch:
    inputs:
      sync_month:
        description: "Month to sync, format: YYYY-MM, for example 2022-01"
        required: true
        default: "2022-01"

permissions:
  contents: write

jobs:
  sync-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 第一步：检查输入月份格式，并计算起止日期
      - name: Prepare month parameters
        id: params
        run: |
          set -e

          sync_month="${{ github.event.inputs.sync_month }}"

          echo "Input sync_month: $sync_month"

          if [[ ! "$sync_month" =~ ^[0-9]{4}-[0-9]{2}$ ]]; then
            echo "Invalid sync_month format: $sync_month"
            echo "Expected format: YYYY-MM, for example 2022-01"
            exit 1
          fi

          start_date="${sync_month}-01"
          end_date=$(date -u -d "$start_date +1 month" +%Y-%m-%d)

          echo "start_date=$start_date"
          echo "end_date=$end_date"

          echo "sync_month=$sync_month" >> "$GITHUB_OUTPUT"
          echo "start_date=$start_date" >> "$GITHUB_OUTPUT"
          echo "end_date=$end_date" >> "$GITHUB_OUTPUT"

      # 第二步：只稀疏下载外部 CNEMC 仓库中指定月份数据
      - name: Sparse clone external CNEMC archive
        run: |
          set -e

          sync_month="${{ steps.params.outputs.sync_month }}"

          start_ts=$(date +%s)

          rm -rf /tmp/cnemc_repo

          echo "Start sparse clone external CNEMC repo, only Archive/${sync_month}-*"

          git clone \
            --depth=1 \
            --filter=blob:none \
            --no-checkout \
            --progress \
            https://github.com/HeQinWill/CNEMC.git \
            /tmp/cnemc_repo

          cd /tmp/cnemc_repo

          git sparse-checkout init --no-cone
          git sparse-checkout set "Archive/${sync_month}-*"

          echo "Start checkout sparse files..."
          checkout_start=$(date +%s)

          git checkout --progress

          checkout_end=$(date +%s)
          echo "Checkout sparse files finished, cost $((checkout_end - checkout_start)) seconds."

          echo "Sparse checkout finished."

          echo "External repo size:"
          du -sh /tmp/cnemc_repo || true

          echo "External Archive/${sync_month}-* folder count:"
          find /tmp/cnemc_repo/Archive -maxdepth 1 -mindepth 1 -type d -name "${sync_month}-*" | wc -l || true

          echo "External Archive/${sync_month}-* file count:"
          find /tmp/cnemc_repo/Archive -type f -path "*/${sync_month}-*/*" | wc -l || true

          end_ts=$(date +%s)
          echo "Sparse clone external CNEMC for ${sync_month} finished, cost $((end_ts - start_ts)) seconds."

      # 第三步：同步指定月份数据，并打印进度
      - name: Sync external CNEMC archive
        run: |
          set -e

          sync_month="${{ steps.params.outputs.sync_month }}"
          start_date="${{ steps.params.outputs.start_date }}"
          end_date="${{ steps.params.outputs.end_date }}"

          start_ts=$(date +%s)

          mkdir -p Archive/CNEMC

          shopt -s nullglob

          mapfile -t dirs < <(
            find /tmp/cnemc_repo/Archive -maxdepth 1 -mindepth 1 -type d -name "${sync_month}-*" -printf "%f\n" | sort
          )

          total=${#dirs[@]}
          echo "Found $total external CNEMC date folders for ${sync_month}."

          if [ "$total" -eq 0 ]; then
            echo "No external CNEMC folders found for ${sync_month}."
            exit 0
          fi

          i=0
          for base in "${dirs[@]}"; do
            i=$((i + 1))

            if [[ ! "$base" < "$start_date" && "$base" < "$end_date" ]]; then
              echo "[$i/$total] Syncing $base"

              mkdir -p "Archive/CNEMC/$base"

              rsync -a --ignore-existing \
                "/tmp/cnemc_repo/Archive/$base/" \
                "Archive/CNEMC/$base/"

              file_count=$(find "Archive/CNEMC/$base" -type f | wc -l)
              echo "[$i/$total] Finished $base, local file count: $file_count"
            else
              echo "[$i/$total] Skipping $base"
            fi
          done

          echo "Current Archive/CNEMC size:"
          du -sh Archive/CNEMC || true

          end_ts=$(date +%s)
          echo "Sync external archive for ${sync_month} finished, cost $((end_ts - start_ts)) seconds."

      # 第四步：提交并推送指定月份数据
      - name: Commit external archive
        run: |
          set -e

          sync_month="${{ steps.params.outputs.sync_month }}"

          start_ts=$(date +%s)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Archive/CNEMC

          echo "Git status summary:"
          git status --short | head -100

          changed_count=$(git diff --cached --name-only | wc -l)
          echo "Staged file count: $changed_count"

          if git diff --cached --quiet; then
            echo "No external archive changes for ${sync_month}."
          else
            git commit -m "Sync CNEMC archive for ${sync_month}"
            git pull --rebase
            git push --progress
          fi

          end_ts=$(date +%s)
          echo "Commit external archive for ${sync_month} finished, cost $((end_ts - start_ts)) seconds."
